<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Atom Structure - Three.js</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#050510; }
  #info {
    position:absolute; top:14px; left:14px; color:#cfd8ff;
    font-family: 'Segoe UI', sans-serif; font-size:14px;
    background:rgba(10,10,25,0.55); padding:10px 16px; border-radius:10px;
    border:1px solid rgba(120,150,255,0.25); max-width:280px; line-height:1.5;
  }
  #info b { color:#8fb4ff; }
  #controls {
    position:absolute; bottom:14px; left:14px; display:flex; gap:8px; flex-wrap:wrap;
  }
  button {
    background:rgba(30,40,70,0.8); color:#cfe0ff; border:1px solid rgba(120,150,255,0.4);
    padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px;
  }
  button:hover { background:rgba(60,80,140,0.9); }
</style>
</head>
<body>
<div id="info">
  <b>Carbon Atom (⁶C)</b><br>
  6 Proton • 6 Neutron • 6 Electron<br>
  মাউস ড্র্যাগ করে ঘোরান, স্ক্রল করে জুম করুন
</div>
<div id="controls">
  <button onclick="setAtom('hydrogen')">Hydrogen (H)</button>
  <button onclick="setAtom('helium')">Helium (He)</button>
  <button onclick="setAtom('carbon')">Carbon (C)</button>
  <button onclick="setAtom('oxygen')">Oxygen (O)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ---------- Basic Scene Setup ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 16);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x445599, 0.9));
const pointLight = new THREE.PointLight(0xffffff, 1.4, 100);
pointLight.position.set(10, 10, 10);
scene.add(pointLight);

// ---------- Simple orbit-style camera control (no external lib needed) ----------
let isDragging = false, prevX = 0, prevY = 0;
let camAngleX = 0.4, camAngleY = 0.0, camDist = 16;
renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  camAngleY += (e.clientX - prevX) * 0.005;
  camAngleX += (e.clientY - prevY) * 0.005;
  camAngleX = Math.max(-1.3, Math.min(1.3, camAngleX));
  prevX = e.clientX; prevY = e.clientY;
});
renderer.domElement.addEventListener('wheel', e => {
  camDist += e.deltaY * 0.01;
  camDist = Math.max(6, Math.min(35, camDist));
});
function updateCamera() {
  camera.position.x = camDist * Math.sin(camAngleY) * Math.cos(camAngleX);
  camera.position.y = camDist * Math.sin(camAngleX);
  camera.position.z = camDist * Math.cos(camAngleY) * Math.cos(camAngleX);
  camera.lookAt(0,0,0);
}

// ---------- Group holding the whole atom (so we can rebuild easily) ----------
let atomGroup = new THREE.Group();
scene.add(atomGroup);

const protonMat = new THREE.MeshStandardMaterial({ color:0xff4d4d, emissive:0x330000, roughness:0.4 });
const neutronMat = new THREE.MeshStandardMaterial({ color:0x9aa4b2, emissive:0x111111, roughness:0.5 });
const electronMat = new THREE.MeshStandardMaterial({ color:0x4dd2ff, emissive:0x0077aa, roughness:0.2 });
const orbitMat = new THREE.LineBasicMaterial({ color:0x3355aa, transparent:true, opacity:0.35 });

function buildNucleus(protonCount, neutronCount) {
  const nucleus = new THREE.Group();
  const total = protonCount + neutronCount;
  const nucleonGeo = new THREE.SphereGeometry(0.55, 20, 20);
  for (let i = 0; i < total; i++) {
    const mat = i % 2 === 0 ? protonMat : neutronMat;
    const mesh = new THREE.Mesh(nucleonGeo, mat);
    // pack nucleons in a small random-but-stable cluster
    const phi = Math.acos(-1 + (2*i)/total);
    const theta = Math.sqrt(total*Math.PI) * phi;
    const r = 0.55;
    mesh.position.set(
      r*Math.cos(theta)*Math.sin(phi),
      r*Math.sin(theta)*Math.sin(phi),
      r*Math.cos(phi)
    );
    nucleus.add(mesh);
  }
  return nucleus;
}

function buildOrbitRing(radius, tiltX, tiltY) {
  const points = [];
  for (let i = 0; i <= 64; i++) {
    const a = (i/64) * Math.PI * 2;
    points.push(new THREE.Vector3(radius*Math.cos(a), 0, radius*Math.sin(a)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const ring = new THREE.LineLoop(geo, orbitMat);
  ring.rotation.x = tiltX;
  ring.rotation.y = tiltY;
  return ring;
}

let electrons = []; // { mesh, radius, speed, angle, tiltX, tiltY }

function buildAtom(protonCount, shellConfig) {
  // shellConfig = array of electron counts per shell, e.g. [2,4]
  atomGroup.clear();
  electrons = [];

  atomGroup.add(buildNucleus(protonCount, protonCount)); // neutrons ~ protons (simplified)

  const electronGeo = new THREE.SphereGeometry(0.25, 16, 16);
  shellConfig.forEach((count, shellIndex) => {
    const radius = 3 + shellIndex * 2.2;
    const tiltX = shellIndex * 0.5;
    const tiltY = shellIndex * 0.8;
    atomGroup.add(buildOrbitRing(radius, tiltX, tiltY));

    for (let i = 0; i < count; i++) {
      const mesh = new THREE.Mesh(electronGeo, electronMat);
      const angle = (i / count) * Math.PI * 2;
      atomGroup.add(mesh);
      electrons.push({ mesh, radius, speed: 0.6 - shellIndex*0.12, angle, tiltX, tiltY });
    }
  });
}

// simple electron configurations for demo elements
const presets = {
  hydrogen: { protons: 1, shells: [1] },
  helium:   { protons: 2, shells: [2] },
  carbon:   { protons: 6, shells: [2, 4] },
  oxygen:   { protons: 8, shells: [2, 6] },
};

function setAtom(name) {
  const p = presets[name];
  document.getElementById('info').innerHTML =
    `<b>${name.charAt(0).toUpperCase()+name.slice(1)} Atom</b><br>` +
    `${p.protons} Proton • ${p.protons} Neutron • ${p.shells.reduce((a,b)=>a+b,0)} Electron<br>` +
    `মাউস ড্র্যাগ করে ঘোরান, স্ক্রল করে জুম করুন`;
  buildAtom(p.protons, p.shells);
}
setAtom('carbon');

// ---------- Animation loop ----------
function animate(t) {
  requestAnimationFrame(animate);
  electrons.forEach(e => {
    e.angle += 0.015 * (e.speed*2);
    const x = e.radius * Math.cos(e.angle);
    const z = e.radius * Math.sin(e.angle);
    const v = new THREE.Vector3(x, 0, z);
    v.applyEuler(new THREE.Euler(e.tiltX, e.tiltY, 0));
    e.mesh.position.copy(v);
  });
  atomGroup.rotation.y += 0.0015;
  updateCamera();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
